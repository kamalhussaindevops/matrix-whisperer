backend:
  name: git-gateway
  branch: main

# Uploaded images go here
media_folder: "public/blog/images"
public_folder: "/blog/images"

# Nice preview of each post in the list
slug:
  encoding: "ascii"
  clean_accents: true

collections:

  # ─────────────────────────────────────────────────────────────
  #  BLOG POSTS
  # ─────────────────────────────────────────────────────────────
  - name: "blog"
    label: "📝 Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/blog/{{slug}}"

    # What shows in the post list (title + date)
    summary: "{{title}} — {{publishedAt}}"

    # Sort newest first in list view
    sortable_fields: ["publishedAt", "title", "category"]
    view_filters:
      - label: "Numerology"
        field: category
        pattern: "Numerology"
      - label: "Compatibility"
        field: category
        pattern: "Compatibility"
      - label: "Forecasting"
        field: category
        pattern: "Forecasting"
      - label: "Spirituality"
        field: category
        pattern: "Spirituality"

    fields:

      - name: title
        label: "Post Title"
        widget: string
        hint: "Keep it under 70 characters for best SEO results"

      - name: description
        label: "Short Description"
        widget: text
        hint: "2–3 sentences shown in the blog card and in Google search results. Keep under 160 characters."

      - name: category
        label: "Category"
        widget: select
        options:
          - { label: "🔢 Numerology",    value: "Numerology" }
          - { label: "💑 Compatibility", value: "Compatibility" }
          - { label: "📅 Forecasting",   value: "Forecasting" }
          - { label: "✨ Spirituality",  value: "Spirituality" }
        default: "Numerology"

      - name: publishedAt
        label: "Publish Date"
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false
        default: ""
        hint: "The date shown on the article. Can be a future date."

      - name: readTime
        label: "Read Time"
        widget: string
        default: "8 min read"
        hint: "e.g. 5 min read, 12 min read"

      - name: author_name
        label: "Author Name"
        widget: string
        default: "DestinyMatrix Team"

      - name: author_role
        label: "Author Role / Title"
        widget: string
        default: "Numerology Writer"
        hint: "e.g. Senior Numerology Editor, Compatibility Specialist"

      - name: tags
        label: "Tags"
        widget: list
        default: []
        hint: "Press Enter after each tag. Used for related posts. e.g. destiny matrix, compatibility, karmic lessons"

      - name: ogImage
        label: "Cover Image"
        widget: image
        required: false
        hint: "Shown at top of the article and in the blog card. Recommended size: 1200×630px."
        media_library:
          config:
            multiple: false

      - name: body
        label: "Article Content"
        widget: markdown
        hint: "Write your full article here. Use ## for section headings, ### for sub-headings. You can insert images using the toolbar."
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list

  # ─────────────────────────────────────────────────────────────
  #  HOMEPAGE & FOOTER
  # ─────────────────────────────────────────────────────────────
  - name: "pages"
    label: "🏠 Site Content"
    files:

      - name: "homepage"
        label: "Homepage Text"
        file: "content/pages/homepage.json"
        fields:

          - label: "Hero Section (Top Banner)"
            name: hero
            widget: object
            collapsed: false
            hint: "The big heading and subtitle visitors see first"
            fields:
              - { name: title,    label: "Main Heading",  widget: string, hint: "e.g. Free Destiny Matrix Calculator" }
              - { name: subtitle, label: "Subheading",    widget: text,   hint: "1–2 sentences below the heading" }
              - { name: ctaText,  label: "Button Text",   widget: string, hint: "e.g. Calculate My Matrix", default: "Calculate My Matrix" }

          - label: "What is the Matrix Section"
            name: whatIsMatrix
            widget: object
            collapsed: true
            hint: "The explanatory section below the calculator"
            fields:
              - { name: title,   label: "Section Heading", widget: string }
              - { name: body,    label: "Body Text",        widget: text,   hint: "2–4 sentences explaining the system" }
              - { name: ctaText, label: "Link Text",        widget: string, hint: "e.g. Learn More →" }
              - { name: ctaLink, label: "Link URL",         widget: string, hint: "e.g. /learn/what-is-destiny-matrix" }

          - label: "Bottom Call-to-Action"
            name: cta
            widget: object
            collapsed: true
            fields:
              - { name: title,      label: "Heading",     widget: string }
              - { name: subtitle,   label: "Subheading",  widget: string }
              - { name: buttonText, label: "Button Text", widget: string, default: "Calculate for Free" }

      - name: "footer"
        label: "Footer & Social Links"
        file: "content/pages/footer.json"
        fields:

          - { name: brandName,        label: "Brand Name",        widget: string, default: "DestinyMatrix" }
          - { name: brandDescription, label: "Tagline",           widget: text,   hint: "Short description shown under the logo" }
          - { name: copyright,        label: "Copyright Text",    widget: string, hint: "e.g. © 2026 DestinyMatrix. All rights reserved." }

          - label: "Social Media Links"
            name: social
            widget: object
            collapsed: false
            hint: "Paste the full URL for each platform you use. Leave blank to hide the icon."
            fields:
              - { name: twitter,   label: "X / Twitter URL",  widget: string, required: false, hint: "https://twitter.com/yourhandle" }
              - { name: instagram, label: "Instagram URL",    widget: string, required: false, hint: "https://instagram.com/yourhandle" }
              - { name: facebook,  label: "Facebook URL",     widget: string, required: false, hint: "https://facebook.com/yourpage" }
              - { name: pinterest, label: "Pinterest URL",    widget: string, required: false, hint: "https://pinterest.com/yourhandle" }
              - { name: reddit,    label: "Reddit URL",       widget: string, required: false, hint: "https://reddit.com/r/yourpage" }
              - { name: tiktok,    label: "TikTok URL",       widget: string, required: false, hint: "https://tiktok.com/@yourhandle" }
              - { name: youtube,   label: "YouTube URL",      widget: string, required: false, hint: "https://youtube.com/@yourchannel" }
