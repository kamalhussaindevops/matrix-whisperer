<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>DestinyMatrix — Content Editor</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0c29; }

      /* ── Loading screen ──────────────────────────────────────── */
      #loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        color: #fff; gap: 20px; z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
        box-shadow: 0 8px 32px rgba(102,126,234,0.4);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(102,126,234,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(102,126,234,0.6); }
      }
      .loading-text { text-align: center; }
      .loading-text h1 {
        font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em;
        background: linear-gradient(135deg, #a78bfa, #f9a8d4);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .loading-text p { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 6px; }
      .loading-bar {
        width: 200px; height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px; overflow: hidden;
      }
      .loading-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2, #f9a8d4);
        border-radius: 2px;
        animation: bar 1.8s ease-in-out infinite;
      }
      @keyframes bar {
        0% { width: 0%; margin-left: 0%; }
        50% { width: 70%; margin-left: 15%; }
        100% { width: 0%; margin-left: 100%; }
      }
    </style>
  </head>
  <body>

    <!-- Loading screen shown until CMS initializes -->
    <div id="loading">
      <div class="loading-logo">✦</div>
      <div class="loading-text">
        <h1>DestinyMatrix CMS</h1>
        <p>Loading your content editor…</p>
      </div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      /* ── 1. Hide loading screen once CMS is ready ─────────────── */
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          var el = document.getElementById("loading");
          if (el) {
            el.style.opacity = "0";
            setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
          }
        }, 2000);
      });

      /* ── 2. Netlify Identity redirect after login ──────────────── */
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }

      /* ── 3. Register preview styles (injected into preview iframe) */
      CMS.registerPreviewStyle(`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        body {
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f9fafb; color: #111827; margin: 0; padding: 0;
        }

        /* ── Blog post preview wrapper ─────────────────── */
        .dm-preview {
          max-width: 780px; margin: 0 auto; padding: 32px 24px 80px;
        }

        /* Cover image */
        .dm-cover {
          width: 100%; height: 260px; object-fit: cover;
          border-radius: 16px; margin-bottom: 24px;
          box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        .dm-cover-placeholder {
          width: 100%; height: 220px;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          border-radius: 16px; margin-bottom: 24px;
          display: flex; align-items: center; justify-content: center;
          font-size: 48px; color: rgba(255,255,255,0.6);
        }

        /* Meta row */
        .dm-meta {
          display: flex; flex-wrap: wrap; gap: 10px;
          align-items: center; margin-bottom: 16px;
        }
        .dm-badge {
          display: inline-block;
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: #fff; font-size: 11px; font-weight: 700;
          letter-spacing: 0.08em; text-transform: uppercase;
          padding: 4px 12px; border-radius: 20px;
        }
        .dm-readtime {
          font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 4px;
        }
        .dm-date { font-size: 13px; color: #9ca3af; }

        /* Title */
        .dm-title {
          font-size: 2rem; font-weight: 800; color: #111827;
          line-height: 1.2; letter-spacing: -0.03em;
          margin: 0 0 14px;
        }

        /* Description */
        .dm-description {
          font-size: 1.1rem; color: #4b5563; line-height: 1.65;
          margin-bottom: 20px; padding-bottom: 20px;
          border-bottom: 1px solid #e5e7eb;
        }

        /* Author */
        .dm-author {
          display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
        }
        .dm-author-avatar {
          width: 40px; height: 40px; border-radius: 50%;
          background: linear-gradient(135deg, #a78bfa, #f9a8d4);
          display: flex; align-items: center; justify-content: center;
          font-size: 18px; color: white; font-weight: 700; flex-shrink: 0;
        }
        .dm-author-name { font-weight: 600; font-size: 14px; color: #111827; }
        .dm-author-role { font-size: 12px; color: #6b7280; }

        /* Article body */
        .dm-body { font-size: 1rem; line-height: 1.75; color: #374151; }
        .dm-body h2 {
          font-size: 1.5rem; font-weight: 700; color: #111827;
          margin: 36px 0 14px; letter-spacing: -0.02em;
          padding-bottom: 8px; border-bottom: 2px solid #f3f4f6;
        }
        .dm-body h3 { font-size: 1.2rem; font-weight: 600; color: #1f2937; margin: 28px 0 10px; }
        .dm-body p { margin: 0 0 18px; }
        .dm-body ul, .dm-body ol { padding-left: 28px; margin: 0 0 18px; }
        .dm-body li { margin-bottom: 6px; }
        .dm-body strong { color: #111827; font-weight: 700; }
        .dm-body em { color: #4b5563; }
        .dm-body blockquote {
          border-left: 4px solid #764ba2;
          background: linear-gradient(135deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05));
          padding: 16px 20px; margin: 20px 0;
          border-radius: 0 8px 8px 0; color: #4b5563; font-style: italic;
        }
        .dm-body a { color: #764ba2; text-decoration: underline; }
        .dm-body code {
          background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
          font-family: monospace; font-size: 0.9em; color: #6d28d9;
        }
        .dm-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 28px 0; }

        /* Empty state */
        .dm-empty {
          text-align: center; padding: 60px 20px; color: #9ca3af;
        }
        .dm-empty .dm-empty-icon { font-size: 48px; margin-bottom: 12px; }
        .dm-empty p { font-size: 14px; }
      `, { raw: true });

      /* ── 4. Blog post live preview template ───────────────────── */
      var h = window.h;

      var BlogPostPreview = createClass({
        render: function () {
          var entry   = this.props.entry;
          var data    = entry.get("data");
          var title   = data.get("title")       || "Untitled Post";
          var desc    = data.get("description") || "";
          var cat     = data.get("category")    || "";
          var author  = data.get("author_name") || "DestinyMatrix Team";
          var role    = data.get("author_role") || "Numerology Writer";
          var rt      = data.get("readTime")    || "";
          var date    = data.get("publishedAt") || "";
          var imgPath = data.get("ogImage")     || "";
          var body    = this.props.widgetFor("body");
          var initial = author ? author.trim()[0].toUpperCase() : "D";

          // Format date nicely if present
          var dateStr = "";
          if (date) {
            try {
              dateStr = new Date(date).toLocaleDateString("en-US", {
                year: "numeric", month: "long", day: "numeric"
              });
            } catch(e) { dateStr = String(date); }
          }

          return h("div", { className: "dm-preview" },

            /* Cover image or gradient placeholder */
            imgPath
              ? h("img", { className: "dm-cover", src: imgPath, alt: title })
              : h("div", { className: "dm-cover-placeholder" }, "✦"),

            /* Category + read time + date */
            h("div", { className: "dm-meta" },
              cat  ? h("span", { className: "dm-badge" }, cat) : null,
              rt   ? h("span", { className: "dm-readtime" }, "⏱ ", rt) : null,
              dateStr ? h("span", { className: "dm-date" }, "📅 ", dateStr) : null
            ),

            /* Title */
            h("h1", { className: "dm-title" }, title),

            /* Description */
            desc ? h("p", { className: "dm-description" }, desc) : null,

            /* Author */
            h("div", { className: "dm-author" },
              h("div", { className: "dm-author-avatar" }, initial),
              h("div", {},
                h("div", { className: "dm-author-name" }, author),
                h("div", { className: "dm-author-role" }, role)
              )
            ),

            /* Article body */
            body
              ? h("div", { className: "dm-body" }, body)
              : h("div", { className: "dm-empty" },
                  h("div", { className: "dm-empty-icon" }, "✍️"),
                  h("p", {}, "Start typing your article on the left to see a preview here.")
                )
          );
        }
      });

      CMS.registerPreviewTemplate("blog", BlogPostPreview);
    </script>
  </body>
</html>
