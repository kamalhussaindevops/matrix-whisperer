[build]
  command = "npm run build"
  publish = ".next"
  # Skip build unless .deploy-trigger changed.
  # CMS saves never touch .deploy-trigger → auto-deploys are skipped.
  # The dashboard "Deploy Now" button updates .deploy-trigger via
  # GitHub API → that commit triggers a real production build.
  ignore = "git diff --quiet HEAD^ HEAD -- .deploy-trigger"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Required for Netlify Identity email confirmation links to work
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"]}

# Netlify Identity — required for Decap CMS auth
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
