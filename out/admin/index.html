<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>DestinyMatrix — Content Editor</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff; gap: 16px; z-index: 9999;
        transition: opacity 0.4s;
      }
      #loading h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
      #loading p  { font-size: 0.9rem; opacity: 0.8; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <h1>DestinyMatrix CMS</h1>
      <p>Loading content editor…</p>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Hide loading screen once CMS is ready
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          var el = document.getElementById("loading");
          if (el) { el.style.opacity = "0"; setTimeout(function(){ el.remove(); }, 400); }
        }, 1800);
      });

      // Redirect back to /admin after login
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
